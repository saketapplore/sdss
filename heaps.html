function slidwindMax(nums, k){
    let result = [];
    let pq = [];

    for (let i = 0; i < nums.length; i++) {
       pq.push([nums[i], i]);

       pq.sort((a,b) => b[0] - a[0]);

       while(pq.length && pq[0][1] <= i - k){
        pq.shift();
       }

       if(i >= k-1){
        result.push(pq[0][0])
       }

    }

    return result;

}
