        class Node {
            constructor(val) {
                this.data = val;
                this.next = null;
            }
        }

        class List {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            push_front(val) {
                const newNode = new Node(val);

                if (this.head === null) {
                    this.head = this.tail = newNode;
                } else {
                    newNode.next = this.head;
                    this.head = newNode
                }

            }

            push_back(val) {
                const newNode = new Node(val);

                if (this.head === null) {
                    this.head = this.tail = newNode;
                } else {
                    this.tail.next = newNode;
                    this.tail = newNode
                }

            }

            print() {
                let temp = this.head;
                let result = '';

                while (temp !== null) {
                    result += temp.data + '->';
                    temp = temp.next;
                }

                console.log(result + "null")

            }

            insertMiddle(value, pos) {
                const newNode = new Node(value);

                let temp = this.head;

                for (let i = 0; i < pos - 1; i++) {
                    temp = temp.next;
                }

                newNode.next = temp.next;
                temp.next = newNode;

            }

            pop_front() {
                if (!this.head) return;

                if (this.head === this.tail) {
                    this.head = this.tail = null;
                } else {
                    this.head = this.head.next;
                }
            }

            pop_back() {

                if (this.head === null) return;

                if (this.head === this.tail) {
                    this.head = this.tail = null;
                    return;
                }

                let current = this.head;
                while (current.next !== this.tail) {
                    current = current.next;
                }

                current.next = null;
                this.tail = current;


            }

                return this.searchHelper(node.next, val, index + 1)

            reverse() {
                let prev = null;
                let curr = this.head;

                while (curr !== null) {
                    let next = curr.next;
                    curr.next = prev;

                    prev = curr;
                    curr = next
                }
                this.head = prev;
            }

            size() {
                let temp = this.head;
                let sz = 0;

                while (temp !== null) {
                    temp = temp.next;
                    sz++;
                }
                return sz;
            }

            removenTh(n) {
                let sz = this.size();
                let prev = this.head;

                for (let i = 1; i < (sz - n); i++) {
                    prev = prev.next;
                }
                prev.next = prev.next.next
            }

                    fast = fast.next.next;

                } else{

               console.log("cycle removed")
