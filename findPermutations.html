<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        function permutations(str , ans = ''){
            if(str.length === 0){
                console.log(ans);
                return;
            }

            for(let i =0; i<str.length; i++){
              let ch = str[i];
              let nextStr = str.substring(0 , i) + str.substring(i+1);
              permutations(nextStr , ans + ch);
            }

        }

        permutations("abc");
    </script>
</head>
