        // Cycle Detection in Directed Graph

        hasCycle(){
            let visited = {};
            let recStack = {};

            for(let node in this.adjList){
                 if(!visited[node]){
                   if(this.dfsCycleDirected(node, visited, recStack)){

                   }
                 }
            }

        dfsCycleDirected(node, visited, recStack){
            visited[node] = true;
            recStack[node] = true;

            let neighbors = this.adjList[node] || [];

            for(let neighbor of neighbors){
                if(!visited[neighbor]){
                    if(this.dfsCycleDirected(neighbor, visited, recStack)){
                        return true;
                    }
                }
                else if(recStack[neighbor]){
                    return true;
                }
            }

            recStack[node] = false;
            return false;

        }
