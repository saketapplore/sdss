<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 
    <script>
    function bs(n , lastPlace , ans = ''){
    
        if(n === 0){
            console.log(ans);
            return ans;
        }

        if(lastPlace !== 1){
          bs(n-1 , 0 , ans + '0')
          bs(n-1 , 1 , ans + '1')
        } else {
            bs(n-1 , 0 , ans + '0')
        }

    }

    bs(3 , 0)

    </script>
    
</head>
