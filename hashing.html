function maxlengthzeroSum(arr){

    let map = new Map();
    let sum = 0;
    let maxLength = 0;

    for(let i = 0; i < arr.length; i++){
        sum += arr[i];

        if(sum === 0){
            maxLength = i + 1;
        }

        if(map.has(sum)){
            let length = i - map.get(sum);
            maxLength = Math.max(maxLength, length);
        } else {
            map.set(sum, i);
        }

    }

    return maxLength;

}
