    <script>
        class Node {
            constructor(val){
                this.val = val;
                this.left = null;
                this.right = null;
            }
        }

        function insert(root, val){
            if(root === null){
                return new Node(val);
            }

            if(val < root.val){
                root.left = insert(root.left, val);
            }else{
                root.right = insert(root.right, val);
            }
            return root;
        }

        function buildBST(arr){
            let root = null;

            for(let val of arr){
                root = insert(root, val);
            }
            return root;
        }


        function search(root , val){
            if(root === null) return false;

            if(root.val === val) return true;

            if(val < root.val) return search(root.left, val);

            return search(root.right, val);

        }

        function deleteNode(root, val){
            if(root === null) return null;


            if(val < root.val) {
                root.left = deleteNode(root.left, val);
            }

            else if(val > root.val){
                root.right = deleteNode(root.right, val);
            }

            else {

                if(root.left === null && root.right === null) return null;

                if(root.left === null) return root.right;
                if(root.right === null) return root.left;

                let successor = findMin(root.right);
                root.val = successor.val;
                root.right = deleteNode(root.right, successor.val);

            } 
 
            return root;

        }
        

          function findMin(root){
            while(root.left !== null){
                root = root.left;
            }
            return root;
          }
        

          function printInRange(root , k1, k2){
            if(root === null) return null;

            if(root.val < k1){
                printInRange(root.right, k1, k2);
            }

            else if(root.val > k2){
                printInRange(root.left, k1, k2);
            }

            else {
                printInRange(root.left, k1, k2);
                console.log(root.val);
                printInRange(root.right, k1, k2);
            }

          }


          function rootToLeafPaths(root, path = []){

            if(root === null) return;

            path.push(root.val);

            if(root.left === null && root.right === null){
                console.log(path.join('->'))
            } else {
                rootToLeafPaths(root.left, path);
                rootToLeafPaths(root.right, path)
            }

            path.pop();

          }


          function validBST(root , min = -Infinity , max = Infinity){

            if (root === null) return true;

            if(root.val <= min || root.val >= max) return false;

            return (
                validBST(root.left, min , root.val) && 
                validBST(root.right, root.val , max)
            )

          }

       
          function sortedToBST(arr,start,end){

            if(start > end) return null;

            let mid = Math.floor((start + end) / 2);

            let root = new Node(arr[mid]);

            root.left = sortedToBST(arr,start,mid-1);
            root.right = sortedToBST(arr,mid+1,end);

            return root;

          }


         function inorder(root, arr = []){

            if(root === null) return arr;

            inorder(root.left, arr);
            arr.push(root.val);
            inorder(root.right, arr);

            return arr;

         }

         function bsttoBalancedBST(root){

            let arr = inorder(root);

            return sortedToBST(arr, 0, arr.length - 1);


         }


         function inorder(root1 , arr = []){
            if(root1 === null) return arr;

            inorder(root1.left, arr);
            arr.push(root1.val);
            inorder(root1.right, arr);
            return arr;

         }

         function merge(arr1, arr2){
            let i = 0, j = 0;

            let result = [];

            while(i < arr1.length && j < arr2.length){
                if(arr1[i] < arr2[j]){
                    result.push(arr1[i]);
                    i++;
                } else{
                    result.push(arr2[j]);
                    j++;
                }
            }

            while(i < arr1.length){
                result.push(arr1[i])
                i++;
            }

            while(j < arr2.length){
                result.push(arr2[j]);
                j++;
            }

            return result;

         }

         function merge2Bst(root1 , root2){
              let arr1 = inorder(root1);
              let arr2 = inorder(root2);

           return merge(arr1 , arr2);
         }
