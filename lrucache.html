<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>

     class LRUCache{
        constructor(capacity){
            this.capacity = capacity;
            this.map = new Map();
        }

        get(key){
            if(!this.map.has(key)) return -1;
            
            let value = this.map.get(key);

            this.map.delete(key);
            this.map.set(key, value);

            return value;

        }

        put(key, value){
            if(this.map.has(key)){
                this.map.delete(key);
            }

            this.map.set(key, value);

            if(this.map.size > this.capacity){
                let firstKey = this.map.keys().next().value;
                this.map.delete(firstKey)
            }

        }

     }

     let cache = new LRUCache(2);


cache.put(1,1);
console.log([...cache.map]); // [[1,1]]

cache.put(2,2);
console.log([...cache.map]); // [[1,2]]

cache.get(1);
console.log([...cache.map]); // [[2,2],[1,1]]

cache.put(3,3);
console.log([...cache.map]); // [[1,1],[3,3]]

cache.get(2);
console.log([...cache.map]); // [[2,2],[1,1]]


    </script>

</head>
